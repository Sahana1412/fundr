<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found - Fundr</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <!-- Custom CSS -->
  <link href="css/style.css" rel="stylesheet">
  <style>
    .error-page-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at 50% 50%, rgba(var(--brand-primary-rgb), 0.05) 0%, transparent 50%), var(--bg-surface);
      padding: 2rem;
    }
  </style>
</head>
<body>

  <div class="error-page-container">
    <div class="card-custom bg-card p-5 text-center shadow-lg animate-zoom" style="max-width: 500px;">
      <div class="mb-4">
        <!-- Heart with crack icon using layered bootstrap icons -->
        <span class="position-relative d-inline-block">
          <i class="bi bi-heartbreak-fill text-danger" style="font-size: 5.5rem; opacity: 0.1;"></i>
          <i class="bi bi-question-circle-fill text-primary position-absolute bottom-0 end-0" style="font-size: 2.2rem; transform: translate(15%, 15%);"></i>
        </span>
      </div>
      <h1 class="display-1 fw-extrabold text-main mb-2" style="font-size: 5rem; letter-spacing: -0.05em; background: linear-gradient(135deg, var(--brand-primary), var(--brand-secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">404</h1>
      <h3 class="fw-bold text-main mb-3">Page Not Found</h3>
      <p class="text-muted mb-4 small">The campaign page you are looking for might have been deleted, had its name changed, or is temporarily unavailable.</p>
      
      <div class="d-flex flex-column gap-2">
        <a href="index.html" class="btn btn-primary-custom py-3 d-flex align-items-center justify-content-center">
          <i class="bi bi-house-door-fill me-2"></i> Go to Homepage
        </a>
        <a href="explore.html" class="btn btn-outline-custom py-3">
          <i class="bi bi-search me-2"></i> Search Campaigns
        </a>
      </div>
    </div>
  </div>

</body>
</html>
