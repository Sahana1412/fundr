<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Explore Campaigns - Fundr</title>
  <meta name="description" content="Search, filter, and discover active crowdfunding campaigns. Support causes directly using secure UPI payments.">
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <!-- Custom CSS -->
  <link href="css/style.css" rel="stylesheet">
</head>
<body>

  <!-- Sticky Navbar -->
  <div id="navbar-placeholder" data-active="campaigns"></div>

  <!-- Header Banner -->
  <section class="py-5 bg-surface border-bottom border-color">
    <div class="container text-center py-3">
      <h1 class="display-5 fw-bold text-main mb-2">Explore Campaigns</h1>
      <p class="text-muted lead max-width-600 mx-auto">Discover and back causes you care about. Every rupee reaches creators directly through instant UPI scans.</p>
    </div>
  </section>

  <!-- Filter & Search Toolbar Section -->
  <section class="py-4 bg-card shadow-sm sticky-md-top" style="top: 70px; z-index: 900; background: var(--bg-card);">
    <div class="container">
      <div class="row align-items-center g-3">
        <!-- Search Input -->
        <div class="col-lg-5 col-md-6">
          <div class="input-group">
            <span class="input-group-text bg-surface border-end-0 text-muted"><i class="bi bi-search"></i></span>
            <input type="text" id="search-input" class="form-control form-control-custom border-start-0 ps-0" placeholder="Search campaign titles, locations, or names...">
          </div>
        </div>
        <!-- Sort Option Dropdown -->
        <div class="col-lg-3 col-md-6 ms-md-auto">
          <div class="d-flex align-items-center gap-2">
            <label for="sort-select" class="text-muted small fw-bold text-nowrap">Sort By:</label>
            <select id="sort-select" class="form-select form-control-custom">
              <option value="Newest" selected>Newest Created</option>
              <option value="Oldest">Oldest Created</option>
              <option value="Most Funded">Most Funded</option>
              <option value="Least Funded">Least Funded</option>
              <option value="Highest Goal">Highest Goal</option>
            </select>
          </div>
        </div>
      </div>
      
      <!-- Category Pills Scroll bar -->
      <div class="mt-3 overflow-x-auto d-flex py-1 no-scrollbar-container">
        <span class="category-pill active" data-category="All">All Categories</span>
        <span class="category-pill" data-category="Medical">Medical</span>
        <span class="category-pill" data-category="Education">Education</span>
        <span class="category-pill" data-category="Startup">Startups</span>
        <span class="category-pill" data-category="Emergency">Emergencies</span>
        <span class="category-pill" data-category="Community">Community</span>
        <span class="category-pill" data-category="Animal Welfare">Animal Welfare</span>
        <span class="category-pill" data-category="Environment">Environment</span>
      </div>
    </div>
  </section>

  <!-- Campaigns Grid Section -->
  <section class="py-5 bg-surface" style="min-height: 450px;">
    <div class="container">
      <div class="row g-4" id="campaigns-grid">
        <!-- Loading Skeletons by default -->
        <div class="col-md-4 skeleton-card"><div class="card-custom"><div class="skeleton skeleton-image"></div><div class="p-4"><div class="skeleton skeleton-text short mb-2"></div><div class="skeleton skeleton-text mb-4"></div><div class="skeleton skeleton-text short"></div></div></div></div>
        <div class="col-md-4 skeleton-card"><div class="card-custom"><div class="skeleton skeleton-image"></div><div class="p-4"><div class="skeleton skeleton-text short mb-2"></div><div class="skeleton skeleton-text mb-4"></div><div class="skeleton skeleton-text short"></div></div></div></div>
        <div class="col-md-4 skeleton-card"><div class="card-custom"><div class="skeleton skeleton-image"></div><div class="p-4"><div class="skeleton skeleton-text short mb-2"></div><div class="skeleton skeleton-text mb-4"></div><div class="skeleton skeleton-text short"></div></div></div></div>
        <div class="col-md-4 skeleton-card"><div class="card-custom"><div class="skeleton skeleton-image"></div><div class="p-4"><div class="skeleton skeleton-text short mb-2"></div><div class="skeleton skeleton-text mb-4"></div><div class="skeleton skeleton-text short"></div></div></div></div>
        <div class="col-md-4 skeleton-card"><div class="card-custom"><div class="skeleton skeleton-image"></div><div class="p-4"><div class="skeleton skeleton-text short mb-2"></div><div class="skeleton skeleton-text mb-4"></div><div class="skeleton skeleton-text short"></div></div></div></div>
        <div class="col-md-4 skeleton-card"><div class="card-custom"><div class="skeleton skeleton-image"></div><div class="p-4"><div class="skeleton skeleton-text short mb-2"></div><div class="skeleton skeleton-text mb-4"></div><div class="skeleton skeleton-text short"></div></div></div></div>
      </div>
    </div>
  </section>

  <!-- Modular Footer -->
  <div id="footer-placeholder"></div>

  <!-- Bootstrap Bundle with Popper JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Shared Client Script -->
  <script src="js/main.js"></script>
  <!-- Explore Page Script -->
  <script src="js/explore.js"></script>
</body>
</html>
